<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>慢切流光</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="game-info">
            <div class="info-item">
                <span>关卡</span>
                <span id="level">1</span>
            </div>
            <div class="info-item">
                <span>时间</span>
                <span id="timer">60</span>
            </div>
            <div class="info-item">
                <span>已切</span>
                <span id="cut">0</span>/<span id="total">0</span>
            </div>
        </div>
        <canvas id="game-canvas"></canvas>
        <div id="start-screen" class="screen">
            <h1>慢切流光</h1>
            <p>横向滑动屏幕切断下落的线条</p>
            <p>全部切断即可通关</p>
            <button id="start-btn">
                <div class="cartoon-btn">
                    <svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="80" cy="80" r="70" fill="#fef3e2" stroke="#e8d4b8" stroke-width="3"/>
                        <ellipse cx="55" cy="60" rx="10" ry="14" fill="#2d2d2d"/>
                        <ellipse cx="105" cy="60" rx="10" ry="14" fill="#2d2d2d"/>
                        <circle cx="58" cy="57" r="4" fill="#fff"/>
                        <circle cx="108" cy="57" r="4" fill="#fff"/>
                        <ellipse cx="40" cy="80" rx="12" ry="8" fill="#ffd1d1" opacity="0.6"/>
                        <ellipse cx="120" cy="80" rx="12" ry="8" fill="#ffd1d1" opacity="0.6"/>
                        <path d="M 60 95 Q 80 115 100 95" stroke="#7a6f61" stroke-width="4" fill="none" stroke-linecap="round"/>
                        <rect x="25" y="35" width="18" height="4" rx="2" fill="#e57373" transform="rotate(-20 34 37)"/>
                        <rect x="117" y="35" width="18" height="4" rx="2" fill="#e57373" transform="rotate(20 126 37)"/>
                        <line x1="120" y1="35" x2="145" y2="55" stroke="#ffb74d" stroke-width="5" stroke-linecap="round"/>
                        <line x1="125" y1="60" x2="148" y2="70" stroke="#64b5f6" stroke-width="4" stroke-linecap="round"/>
                        <line x1="118" y1="85" x2="142" y2="90" stroke="#81c784" stroke-width="4" stroke-linecap="round"/>
                    </svg>
                    <span class="btn-text">开始游戏</span>
                </div>
            </button>
        </div>
        <div id="retry-screen" class="screen hidden">
            <h1>线条落地了</h1>
            <p>没关系，再试一次吧</p>
            <button id="retry-btn">重试</button>
        </div>
        <div id="win-screen" class="screen hidden">
            <h1>完美通关！</h1>
            <p>准备进入下一关</p>
            <button id="next-btn">下一关</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
