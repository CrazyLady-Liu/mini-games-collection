<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>气球爆破</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <div class="score-display">
                <span class="label">分数</span>
                <span id="score" class="score-value">0</span>
            </div>
            <div class="level-display">
                <span class="label">关卡</span>
                <span id="level" class="level-value">1</span>
            </div>
            <div class="combo-display">
                <span class="label">连击</span>
                <span id="combo" class="combo-value">0</span>
                <span class="multiplier" id="multiplier">x1</span>
            </div>
            <div class="lives-display">
                <span class="label">生命</span>
                <div class="hearts-container" id="heartsContainer">
                    <span class="heart">❤️</span>
                    <span class="heart">❤️</span>
                    <span class="heart">❤️</span>
                </div>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div class="combo-popup" id="comboPopup"></div>
        <div class="level-up-popup" id="levelUpPopup">
            <h2>关卡 <span id="newLevel">2</span>!</h2>
            <p>难度提升！</p>
        </div>
        <div class="damage-flash" id="damageFlash"></div>
        <div class="game-over" id="gameOver">
            <h2>游戏结束</h2>
            <div class="final-stats">
                <p>最终分数：<span id="finalScore">0</span></p>
                <p>达到关卡：<span id="finalLevel">1</span></p>
                <p>最高连击：<span id="maxCombo">0</span></p>
            </div>
            <button id="restartBtn">重新开始</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
