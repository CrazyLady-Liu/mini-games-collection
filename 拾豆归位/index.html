<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拾豆归位</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>拾豆归位</h1>
            <div class="level-display">第 <span id="level">1</span> 关</div>
        </div>
        <div class="game-area" id="gameArea">
            <div class="containers">
                <div class="container red" id="redContainer"></div>
                <div class="container blue" id="blueContainer"></div>
            </div>
        </div>
        <div class="high-score" id="highScore">最高：第 <span id="highScoreNum">1</span> 关</div>
        <div class="message" id="message"></div>
        <div class="error-toast" id="errorToast">颜色不对哦，重新试试</div>
        <div class="complete-toast" id="completeToast">完成！进入下一关</div>
    </div>
    <script src="game.js"></script>
</body>
</html>
