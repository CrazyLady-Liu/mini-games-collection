<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音序回响 - Sequence Echo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Noto Sans SC', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .game-container {
            text-align: center;
            padding: 40px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #fff;
            font-size: 2.8rem;
            font-weight: 200;
            margin-bottom: 10px;
            letter-spacing: 6px;
        }

        .subtitle {
            color: rgba(200, 200, 210, 0.85);
            font-size: 0.95rem;
            margin-bottom: 30px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 30px;
        }

        .stat {
            color: #fff;
        }

        .stat-label {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
        }

        .note-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 40px 0;
        }

        .note-btn {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 1.8rem;
            font-weight: 300;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .note-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0);
            border-radius: 50%;
            transition: background 0.15s ease;
        }

        .note-btn:hover::before {
            background: rgba(255, 255, 255, 0.15);
        }

        .note-btn:hover {
            transform: scale(1.03);
        }

        .note-btn:active {
            transform: scale(0.97);
        }

        .note-btn.active {
            transform: scale(1.08);
            filter: brightness(1.1);
            z-index: 10;
        }

        .note-btn.shake {
            animation: shake 0.3s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: scale(1.08) translateX(0); }
            25% { transform: scale(1.08) translateX(-5px); }
            75% { transform: scale(1.08) translateX(5px); }
        }

        .note-1 {
            background: linear-gradient(145deg, #b8ecd8, #8fdbc2);
            color: #3d7a5f;
            box-shadow: 0 4px 15px rgba(168, 230, 207, 0.25);
        }

        .note-2 {
            background: linear-gradient(145deg, #ffc9c4, #ffaba5);
            color: #a35550;
            box-shadow: 0 4px 15px rgba(255, 183, 178, 0.25);
        }

        .note-3 {
            background: linear-gradient(145deg, #d5c4ff, #c4a8ff);
            color: #7559a8;
            box-shadow: 0 4px 15px rgba(201, 177, 255, 0.25);
        }

        .note-4 {
            background: linear-gradient(145deg, #fff0b8, #ffe89d);
            color: #a08550;
            box-shadow: 0 4px 15px rgba(255, 234, 167, 0.25);
        }

        .status {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.2rem;
            margin: 20px 0;
            min-height: 30px;
            font-weight: 500;
        }

        .status.error {
            color: #ff6b6b;
        }

        .status.success {
            color: #a8e6cf;
        }

        .btn {
            padding: 15px 50px;
            font-size: 1.1rem;
            font-weight: 500;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            margin: 10px;
        }

        .btn-primary {
            background: linear-gradient(145deg, #b8c6e8, #a5b4e8);
            color: #4a5568;
            box-shadow: 0 4px 15px rgba(165, 180, 232, 0.25);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            background: linear-gradient(145deg, #c8d4f0, #b5c4f0);
            box-shadow: 0 6px 20px rgba(165, 180, 232, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(200, 200, 210, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .controls {
            margin-top: 30px;
        }

        .sequence-display {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
            min-height: 50px;
            flex-wrap: wrap;
        }

        .sequence-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            opacity: 0.3;
            transition: all 0.3s ease;
        }

        .sequence-dot.filled {
            opacity: 1;
            transform: scale(1.2);
        }

        .sequence-dot.correct {
            background: #a8e6cf !important;
            box-shadow: 0 0 15px #a8e6cf;
        }

        .sequence-dot.wrong {
            background: #ff6b6b !important;
            box-shadow: 0 0 15px #ff6b6b;
        }

        .sequence-dot-1 { background: #a8e6cf; }
        .sequence-dot-2 { background: #ffb7b2; }
        .sequence-dot-3 { background: #c9b1ff; }
        .sequence-dot-4 { background: #ffeaa7; }

        .start-screen, .game-screen {
            transition: opacity 0.5s ease;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
            position: absolute;
        }

        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 30px 50px;
            border-radius: 20px;
            font-size: 1.5rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 100;
        }

        .message.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="start-screen" id="startScreen">
            <h1>音序回响</h1>
            <p class="subtitle">聆听旋律，复刻回响</p>
            <button class="btn btn-primary" id="startBtn">开始游戏</button>
        </div>

        <div class="game-screen hidden" id="gameScreen">
            <h1>音序回响</h1>

            <div class="stats">
                <div class="stat">
                    <div class="stat-label">关卡</div>
                    <div class="stat-value" id="levelDisplay">1</div>
                </div>
                <div class="stat">
                    <div class="stat-label">序列长度</div>
                    <div class="stat-value" id="lengthDisplay">3</div>
                </div>
            </div>

            <div class="sequence-display" id="sequenceDisplay"></div>

            <div class="note-buttons">
                <button class="note-btn note-1" data-note="1">1</button>
                <button class="note-btn note-2" data-note="2">2</button>
                <button class="note-btn note-3" data-note="3">3</button>
                <button class="note-btn note-4" data-note="4">4</button>
            </div>

            <div class="status" id="status">准备就绪</div>

            <div class="controls">
                <button class="btn btn-secondary" id="replayBtn">重听序列</button>
                <button class="btn btn-secondary" id="retryBtn">重试本关</button>
                <button class="btn btn-secondary" id="restartBtn">重新开始</button>
            </div>
        </div>
    </div>

    <div class="message" id="message"></div>

    <script>
        class AudioManager {
            constructor() {
                this.audioContext = null;
                this.frequencies = [261.63, 329.63, 392.00, 493.88];
            }

            init() {
                if (!this.audioContext) {
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (this.audioContext.state === 'suspended') {
                    this.audioContext.resume();
                }
            }

            playNote(noteIndex, duration = 0.4) {
                this.init();
                const oscillator = this.audioContext.createOscillator();
                const gainNode = this.audioContext.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(this.audioContext.destination);

                oscillator.type = 'sine';
                oscillator.frequency.value = this.frequencies[noteIndex - 1];

                gainNode.gain.setValueAtTime(0.3, this.audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + duration);

                oscillator.start(this.audioContext.currentTime);
                oscillator.stop(this.audioContext.currentTime + duration);
            }

            playSuccess() {
                this.init();
                const notes = [261.63, 329.63, 392.00, 523.25];
                notes.forEach((freq, i) => {
                    setTimeout(() => {
                        const oscillator = this.audioContext.createOscillator();
                        const gainNode = this.audioContext.createGain();
                        oscillator.connect(gainNode);
                        gainNode.connect(this.audioContext.destination);
                        oscillator.type = 'sine';
                        oscillator.frequency.value = freq;
                        gainNode.gain.setValueAtTime(0.2, this.audioContext.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + 0.3);
                        oscillator.start(this.audioContext.currentTime);
                        oscillator.stop(this.audioContext.currentTime + 0.3);
                    }, i * 100);
                });
            }

            playFail() {
                this.init();
                const notes = [392.00, 329.63, 261.63];
                notes.forEach((freq, i) => {
                    setTimeout(() => {
                        const oscillator = this.audioContext.createOscillator();
                        const gainNode = this.audioContext.createGain();
                        oscillator.connect(gainNode);
                        gainNode.connect(this.audioContext.destination);
                        oscillator.type = 'sine';
                        oscillator.frequency.value = freq;
                        gainNode.gain.setValueAtTime(0.2, this.audioContext.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + 0.4);
                        oscillator.start(this.audioContext.currentTime);
                        oscillator.stop(this.audioContext.currentTime + 0.4);
                    }, i * 150);
                });
            }
        }

        class Game {
            constructor() {
                this.audio = new AudioManager();
                this.level = 1;
                this.sequence = [];
                this.playerInput = [];
                this.isPlaying = false;
                this.isPlayerTurn = false;

                this.noteButtons = document.querySelectorAll('.note-btn');
                this.startScreen = document.getElementById('startScreen');
                this.gameScreen = document.getElementById('gameScreen');
                this.status = document.getElementById('status');
                this.levelDisplay = document.getElementById('levelDisplay');
                this.lengthDisplay = document.getElementById('lengthDisplay');
                this.sequenceDisplay = document.getElementById('sequenceDisplay');
                this.message = document.getElementById('message');

                this.bindEvents();
            }

            bindEvents() {
                document.getElementById('startBtn').addEventListener('click', () => this.startGame());
                document.getElementById('replayBtn').addEventListener('click', () => this.replaySequence());
                document.getElementById('retryBtn').addEventListener('click', () => this.retryLevel());
                document.getElementById('restartBtn').addEventListener('click', () => this.restartGame());

                this.noteButtons.forEach(btn => {
                    btn.addEventListener('click', () => {
                        if (this.isPlayerTurn) {
                            const note = parseInt(btn.dataset.note);
                            this.handlePlayerInput(note, btn);
                        }
                    });
                });
            }

            replaySequence() {
                if (!this.isPlayerTurn || this.isPlaying) return;
                this.playerInput = [];
                this.renderSequenceDots();
                this.playSequence();
            }

            startGame() {
                this.level = 1;
                this.startScreen.classList.add('hidden');
                this.gameScreen.classList.remove('hidden');
                this.startLevel();
            }

            restartGame() {
                this.level = 1;
                this.startLevel();
            }

            retryLevel() {
                this.startLevel();
            }

            getSequenceLength() {
                if (this.level <= 2) return 3;
                if (this.level <= 4) return 4;
                if (this.level <= 6) return 5;
                return 6;
            }

            generateSequence(length) {
                const seq = [];
                for (let i = 0; i < length; i++) {
                    seq.push(Math.floor(Math.random() * 4) + 1);
                }
                return seq;
            }

            updateDisplay() {
                this.levelDisplay.textContent = this.level;
                this.lengthDisplay.textContent = this.sequence.length;
                this.renderSequenceDots();
            }

            renderSequenceDots() {
                this.sequenceDisplay.innerHTML = '';
                this.sequence.forEach((note, i) => {
                    const dot = document.createElement('div');
                    dot.className = `sequence-dot sequence-dot-${note}`;
                    if (i < this.playerInput.length) {
                        dot.classList.add('filled');
                        if (this.playerInput[i] === this.sequence[i]) {
                            dot.classList.add('correct');
                        } else {
                            dot.classList.add('wrong');
                        }
                    }
                    this.sequenceDisplay.appendChild(dot);
                });
            }

            startLevel() {
                this.sequence = this.generateSequence(this.getSequenceLength());
                this.playerInput = [];
                this.updateDisplay();
                this.status.textContent = '准备播放...';
                this.status.className = 'status';

                setTimeout(() => this.playSequence(), 800);
            }

            async playSequence() {
                this.isPlaying = true;
                this.isPlayerTurn = false;
                this.status.textContent = '请仔细聆听...';

                for (let i = 0; i < this.sequence.length; i++) {
                    await this.delay(400);
                    await this.highlightNote(this.sequence[i] - 1);
                }

                await this.delay(600);
                this.isPlaying = false;
                this.isPlayerTurn = true;
                this.status.textContent = '请复刻序列';
            }

            highlightNote(index) {
                return new Promise(resolve => {
                    const btn = this.noteButtons[index];
                    btn.classList.add('active', 'shake');
                    this.audio.playNote(index + 1);

                    setTimeout(() => {
                        btn.classList.remove('active', 'shake');
                        resolve();
                    }, 400);
                });
            }

            handlePlayerInput(note, btn) {
                this.audio.playNote(note);
                btn.classList.add('active');
                setTimeout(() => btn.classList.remove('active'), 150);

                this.playerInput.push(note);
                this.renderSequenceDots();

                const currentIndex = this.playerInput.length - 1;

                if (note !== this.sequence[currentIndex]) {
                    this.handleMistake();
                    return;
                }

                if (this.playerInput.length === this.sequence.length) {
                    this.handleSuccess();
                }
            }

            handleMistake() {
                this.isPlayerTurn = false;
                this.status.textContent = '顺序有误，请重试';
                this.status.className = 'status error';
                this.audio.playFail();

                this.showMessage('顺序错误', 1500);

                setTimeout(() => {
                    this.playerInput = [];
                    this.renderSequenceDots();
                    this.isPlayerTurn = true;
                    this.status.textContent = '请复刻序列';
                    this.status.className = 'status';
                }, 2000);
            }

            handleSuccess() {
                this.isPlayerTurn = false;
                this.status.textContent = '太棒了！';
                this.status.className = 'status success';
                this.audio.playSuccess();

                this.showMessage('关卡完成！', 1500);

                setTimeout(() => {
                    this.level++;
                    this.startLevel();
                }, 2000);
            }

            showMessage(text, duration) {
                this.message.textContent = text;
                this.message.classList.add('show');
                setTimeout(() => {
                    this.message.classList.remove('show');
                }, duration);
            }

            delay(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }
        }

        const game = new Game();
    </script>
</body>
</html>
