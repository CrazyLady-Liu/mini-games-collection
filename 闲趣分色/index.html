<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>闲趣分色</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <h1>闲趣分色</h1>
            <div class="difficulty-selector">
                <button class="difficulty-btn active" data-difficulty="easy">简单</button>
                <button class="difficulty-btn" data-difficulty="normal">普通</button>
                <button class="difficulty-btn" data-difficulty="hard">困难</button>
            </div>
            <button class="restart-btn" id="restartBtn">重新开始</button>
        </header>

        <div class="control-panel">
            <div class="speed-control">
                <span class="control-label">拖拽响应：</span>
                <div class="speed-btns">
                    <button class="speed-btn" data-speed="slow">慢</button>
                    <button class="speed-btn active" data-speed="normal">中</button>
                    <button class="speed-btn" data-speed="fast">快</button>
                    <button class="speed-btn" data-speed="extreme">极速</button>
                </div>
                <div class="slider-control">
                    <input type="range" id="speedSlider" min="0.05" max="0.3" step="0.01" value="0.12">
                    <span id="speedValue">0.12</span>
                </div>
            </div>
            <button class="pause-btn" id="pauseBtn">⏸ 暂停</button>
        </div>

        <main class="game-area">
            <div class="containers-area" id="containersArea"></div>
            <div class="dots-area" id="dotsArea"></div>
        </main>

        <div class="game-overlay" id="gameOverlay">
            <div class="overlay-content">
                <h2>🎉 恭喜通关！</h2>
                <button class="overlay-btn" id="continueBtn">继续挑战</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
