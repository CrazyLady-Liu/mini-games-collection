<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>迷宫逃生</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>迷宫逃生</h1>
            <div class="info-panel">
                <div class="timer">
                    <span>剩余时间：</span>
                    <span id="time-display">60</span>
                    <span>秒</span>
                </div>
                <div class="status" id="status-display">准备开始</div>
            </div>
        </div>
        <div class="difficulty-panel">
            <label>难度选择：</label>
            <div class="difficulty-buttons">
                <button class="difficulty-btn active" data-difficulty="easy">简单</button>
                <button class="difficulty-btn" data-difficulty="normal">普通</button>
                <button class="difficulty-btn" data-difficulty="hard">困难</button>
            </div>
        </div>
        <div class="maze-wrapper">
            <canvas id="maze-canvas"></canvas>
        </div>
        <div class="controls">
            <button id="start-btn">开始游戏</button>
            <button id="reset-btn">重置迷宫</button>
        </div>
        <div class="instructions">
            <p>使用方向键 ↑ ↓ ← → 或 WASD 控制角色移动</p>
        </div>
    </div>
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="modal-title">游戏结束</h2>
            <p id="modal-message"></p>
            <button id="modal-btn">再来一局</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
