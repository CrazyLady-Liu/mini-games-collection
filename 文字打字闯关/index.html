<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文字打字闯关</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: #fff;
        }
        h1 {
            margin-top: 20px;
            font-size: 2.5rem;
            text-shadow: 0 0 20px rgba(102, 126, 234, 0.8);
        }
        #game-container {
            margin-top: 20px;
            position: relative;
        }
        #gameCanvas {
            border: 2px solid #667eea;
            border-radius: 10px;
            background: #0f0f23;
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.3);
        }
        #ui {
            margin-top: 15px;
            display: flex;
            gap: 30px;
            font-size: 1.2rem;
        }
        .stat {
            background: rgba(102, 126, 234, 0.2);
            padding: 10px 25px;
            border-radius: 25px;
            border: 1px solid #667eea;
        }
        #input-display {
            margin-top: 15px;
            width: 800px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid #667eea;
            border-radius: 10px;
            text-align: center;
            font-size: 1.5rem;
            min-height: 60px;
            transition: all 0.3s ease;
        }
        #input-display.focused {
            border-color: #43e97b;
            box-shadow: 0 0 20px rgba(67, 233, 123, 0.4);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(67, 233, 123, 0.4); }
            50% { box-shadow: 0 0 40px rgba(67, 233, 123, 0.8); }
        }
        #input-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        #input-wrapper {
            flex: 1;
        }
        #clearBtn {
            padding: 10px 25px;
            font-size: 1rem;
            margin-top: 0;
            background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%);
        }
        #start-screen, #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
        }
        .hidden {
            display: none !important;
        }
        button {
            margin-top: 20px;
            padding: 15px 50px;
            font-size: 1.3rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.6);
        }
        #instructions {
            margin-top: 20px;
            text-align: center;
            line-height: 1.8;
            color: #aaa;
        }
    </style>
</head>
<body>
    <h1>🎯 文字打字闯关</h1>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="start-screen">
            <h2>欢迎来到文字打字闯关！</h2>
            <div id="instructions">
                <p>📝 输入屏幕上落下的文字来消除它们</p>
                <p>⚡ 连续正确输入可触发连击加分</p>
                <p>📈 难度会逐渐提升，文字下落越来越快</p>
                <p>❌ 文字触底则游戏结束</p>
            </div>
            <button id="startBtn">开始游戏</button>
        </div>
        <div id="game-over-screen" class="hidden">
            <h2>游戏结束！</h2>
            <p id="final-score" style="font-size: 2rem; margin-top: 20px;"></p>
            <button id="restartBtn">重新开始</button>
        </div>
    </div>
    <div id="ui">
        <div class="stat">分数: <span id="score">0</span></div>
        <div class="stat">连击: <span id="combo">0</span>x</div>
        <div class="stat">难度: <span id="level">1</span></div>
    </div>
    <div id="input-display">
        <div id="input-container">
            <div id="input-wrapper">输入: <span id="input-text"></span><span id="cursor">|</span></div>
            <button id="clearBtn">清空</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
