<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>慢压气泡 - 解压小游戏</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="game-container">
        <div class="top-ui">
            <div class="game-info">
                <span class="level">关卡: <span id="level-display">1</span></span>
                <span class="bubbles-left">剩余气泡: <span id="bubbles-count">0</span></span>
                <span class="chances">机会: <span id="chances-count">3</span></span>
                <span class="rhythm-toggle">
                    <label>
                        <input type="checkbox" id="rhythm-toggle" checked>
                        节奏条
                    </label>
                </span>
            </div>
            <div class="speed-indicator">
                <span id="speed-text">准备开始</span>
            </div>
            <div class="controls">
                <button id="how-to-play-btn" class="control-btn">如何玩</button>
                <button id="pause-btn" class="control-btn">暂停</button>
            </div>
        </div>
        
        <div id="game-area">
            <div id="bubbles-container"></div>
        </div>
        
        <div class="bottom-ui">
            <button id="restart-btn" class="control-btn">重新开始</button>
        </div>
    </div>
    
    <div id="how-to-play-modal" class="modal hidden">
        <div class="modal-content">
            <h2>如何玩</h2>
            <ul>
                <li>长按/按住气泡进行按压</li>
                <li>保持匀速按压（绿色）</li>
                <li>过快会变红警告，过慢会变灰警告</li>
                <li>压平所有气泡即可通关</li>
            </ul>
            <h3>气泡类型</h3>
            <ul>
                <li><span class="bubble-type normal-type">●</span> 普通气泡：匀速按压即可消除</li>
                <li><span class="bubble-type fast-type">●</span> 快压气泡：必须偏快节奏按压，慢压回弹</li>
                <li><span class="bubble-type slow-type">●</span> 慢压气泡：必须缓慢匀速按压，快压回弹</li>
                <li><span class="bubble-type fragile-type">●</span> 易碎气泡：中途松手直接破裂，扣1次机会</li>
            </ul>
            <button id="close-modal-btn" class="control-btn">知道了</button>
        </div>
    </div>
    
    <div id="pause-modal" class="modal hidden">
        <div class="modal-content">
            <h2>游戏暂停</h2>
            <button id="resume-btn" class="control-btn">继续游戏</button>
            <button id="pause-restart-btn" class="control-btn">重新开始</button>
        </div>
    </div>
    
    <div id="level-complete-modal" class="modal hidden">
        <div class="modal-content">
            <h2>🎉 关卡完成！</h2>
            <p>太棒了！进入下一关</p>
            <button id="next-level-btn" class="control-btn">下一关</button>
        </div>
    </div>
    
    <div id="game-over-modal" class="modal hidden">
        <div class="modal-content">
            <h2>💔 游戏结束</h2>
            <p>机会用完了，再试一次吧！</p>
            <button id="game-over-restart-btn" class="control-btn">重新开始</button>
        </div>
    </div>

    <script src="game.js?t=202605131800"></script>
</body>
</html>
