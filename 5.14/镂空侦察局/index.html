<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>镂空侦察局</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <h1>🔍 镂空侦察局</h1>
            <div class="game-info">
                <div class="info-item">
                    <span class="label">关卡</span>
                    <span id="level" class="value">1</span>
                </div>
                <div class="info-item">
                    <span class="label">目标</span>
                    <span id="target-count" class="value">0</span>
                </div>
                <div class="info-item">
                    <span class="label">已标记</span>
                    <span id="marked-count" class="value">0</span>
                </div>
            </div>
        </header>

        <div class="game-rules">
            <p>🎯 点击所有<strong>全镂空</strong>图形，全部选对自动通关！</p>
            <p class="legend">
                <span class="legend-item"><span class="sample solid"></span>实心</span>
                <span class="legend-item"><span class="sample half"></span>半镂空</span>
                <span class="legend-item"><span class="sample hollow"></span>全镂空</span>
            </p>
            <p class="phase-tip">
                <span class="phase easy">🌟 简单关(1-3):</span> 图形大、特征明显
                <span class="phase medium">⚡ 进阶关(4-6):</span> 图形缩小、半镂空更细腻
                <span class="phase hard">🔥 挑战关(7+):</span> 不规则图形、干扰元素
            </p>
        </div>

        <div id="game-board" class="game-board"></div>

        <div class="game-actions">
            <button id="reset-btn" class="btn btn-secondary">重置本关</button>
        </div>

        <div id="message" class="message"></div>
    </div>

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="modal-title">🎉 恭喜通关！</h2>
            <p id="modal-message"></p>
            <button id="modal-btn" class="btn btn-primary">继续</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
