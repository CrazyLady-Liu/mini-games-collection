<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>留白占比小游戏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎨 留白占比小游戏</h1>
            <div class="mode-switch">
                <button id="forwardModeBtn" class="mode-btn active">正向模式</button>
                <button id="reverseModeBtn" class="mode-btn">反向模式</button>
            </div>
        </header>

        <div class="game-info">
            <div class="info-item">
                <span class="label">得分</span>
                <span id="score" class="value">0</span>
            </div>
            <div class="info-item">
                <span class="label">倒计时</span>
                <span id="timer" class="value">60</span>
            </div>
            <div class="info-item">
                <span class="label">题目</span>
                <span id="question" class="value">1</span>
            </div>
        </div>

        <div id="forwardMode" class="mode-content">
            <div class="game-area">
                <canvas id="gameCanvas" width="500" height="500"></canvas>
                <div id="resultOverlay" class="overlay hidden">
                    <div id="resultText" class="result-text"></div>
                </div>
            </div>

            <div class="question-text">
                <p>留白区域约占总面积的百分之多少？</p>
            </div>

            <div class="options" id="options">
                <button class="option-btn" data-range="0">A. 0% - 25%</button>
                <button class="option-btn" data-range="1">B. 25% - 50%</button>
                <button class="option-btn" data-range="2">C. 50% - 75%</button>
                <button class="option-btn" data-range="3">D. 75% - 100%</button>
            </div>
        </div>

        <div id="reverseMode" class="mode-content hidden">
            <div class="target-display">
                <span class="target-label">目标留白占比：</span>
                <span id="targetPercent" class="target-value">50%</span>
            </div>

            <div class="game-area">
                <canvas id="reverseCanvas" width="500" height="500"></canvas>
                <div id="reverseResultOverlay" class="overlay hidden">
                    <div id="reverseResultText" class="result-text"></div>
                </div>
            </div>

            <div class="reverse-info">
                <div class="current-percent">
                    <span>当前留白：</span>
                    <span id="currentBlankPercent">100%</span>
                </div>
                <div class="accuracy">
                    <span>匹配度：</span>
                    <span id="accuracy">0%</span>
                </div>
            </div>

            <div class="reverse-controls">
                <button id="clearBtn" class="control-btn secondary">🗑️ 清空画布</button>
                <button id="submitBtn" class="control-btn">✅ 提交答案</button>
            </div>

            <div class="drawing-tools">
                <p class="tools-hint">💡 提示：点击或拖动鼠标在画布上绘制色块</p>
                <div class="brush-size">
                    <label for="brushSize">画笔大小：</label>
                    <input type="range" id="brushSize" min="20" max="100" value="50">
                    <span id="brushSizeValue">50</span>
                </div>
            </div>
        </div>

        <div class="controls">
            <button id="restartBtn" class="control-btn">🔄 重新开始</button>
            <button id="nextBtn" class="control-btn">⏭️ 下一题</button>
        </div>

        <div id="gameOverModal" class="modal hidden">
            <div class="modal-content">
                <h2>🎉 游戏结束</h2>
                <p>你的最终得分是：<span id="finalScore">0</span> 分</p>
                <p>共完成 <span id="totalQuestions">0</span> 题</p>
                <button id="playAgainBtn" class="control-btn">再来一局</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
