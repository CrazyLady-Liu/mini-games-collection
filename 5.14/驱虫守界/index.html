<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>驱虫守界</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container" id="gameContainer">
        <div class="grass-pattern"></div>
        
        <div class="decoration">
            <div class="grass-tuft grass-1"><span></span></div>
            <div class="grass-tuft grass-2"><span></span></div>
            <div class="grass-tuft grass-3"><span></span></div>
            <div class="grass-tuft grass-4"><span></span></div>
        </div>
        
        <div class="decoration">
            <div class="sparkle sparkle-1"></div>
            <div class="sparkle sparkle-2"></div>
            <div class="sparkle sparkle-3"></div>
            <div class="sparkle sparkle-4"></div>
            <div class="sparkle sparkle-5"></div>
            <div class="sparkle sparkle-6"></div>
        </div>
        
        <div class="boundary-line boundary-top"></div>
        <div class="boundary-line boundary-bottom"></div>
        <div class="boundary-line boundary-left"></div>
        <div class="boundary-line boundary-right"></div>
        
        <div class="fence-post post-1"></div>
        <div class="fence-post post-2"></div>
        <div class="fence-post post-3"></div>
        <div class="fence-post post-4"></div>
        
        <div class="game-ui">
            <div class="top-bar">
                <div class="stats">
                    <div class="stat-item">
                        <span class="label">关卡</span>
                        <span class="value" id="level">1</span>
                    </div>
                    <div class="stat-item">
                        <span class="label">守护时长</span>
                        <span class="value" id="remainingTime">30</span>秒
                    </div>
                    <div class="stat-item">
                        <span class="label">存活计时</span>
                        <span class="value" id="survivalTime">0</span>秒
                    </div>
                    <div class="stat-item">
                        <span class="label">小虫数量</span>
                        <span class="value" id="bugCount">0</span>
                    </div>
                    <div class="stat-item combo-stat" id="comboStat">
                        <span class="label">连击</span>
                        <span class="value" id="comboCount">0</span>
                    </div>
                </div>
                <div class="top-buttons">
                    <button class="btn btn-how-to-play" id="howToPlayBtn">如何玩</button>
                    <button class="btn btn-pause" id="pauseBtn">暂停</button>
                </div>
            </div>
            
            <div class="bottom-bar">
                <button class="btn" id="restartBtn">重新开始</button>
            </div>
        </div>
        
        <div class="game-area" id="gameArea">
        </div>
        
        <div class="combo-display" id="comboDisplay"></div>
        
        <div class="modal" id="howToPlayModal">
            <div class="modal-content">
                <h2>如何玩</h2>
                <p>点击小虫将其驱赶回中心区域</p>
                <p>阻止小虫爬出小院子围栏</p>
                <p>连续驱赶多只小虫触发连击加分！</p>
                <button class="btn" id="closeModalBtn">知道了</button>
            </div>
        </div>
        
        <div class="modal" id="gameOverModal">
            <div class="modal-content">
                <h2>游戏结束</h2>
                <p>小虫爬出了院子！</p>
                <button class="btn" id="restartGameBtn">重新开始</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
