<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>点点盖个章</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>点点盖个章</h1>
        
        <div class="level-info" id="levelInfo">自由创作模式</div>
        
        <!-- 目标图案区域 -->
        <div class="target-section">
            <h2>参考图案</h2>
            <div class="target-container">
                <div class="target-pattern" id="targetPattern"></div>
            </div>
            <div class="reference-buttons">
                <button class="toggle-reference" id="toggleReference">显示参考图 (R)</button>
                <button class="toggle-reference" id="overlayBtn">叠加参考 (O)</button>
            </div>
            <div class="shortcut-hint">快捷键：1-9选印章 · Ctrl+Z撤销 · Delete清空 · R参考图 · O叠加 · [缩小 · ]放大 · ,左旋 · .右旋</div>
        </div>
        
        <!-- 印章自定义控制 -->
        <div class="stamp-controls">
            <div class="control-group">
                <label>印章大小：<span id="sizeValue">60</span>px</label>
                <input type="range" id="sizeSlider" min="20" max="150" value="60" class="slider">
                <div class="control-buttons">
                    <button class="mini-btn" id="sizeDown">-</button>
                    <button class="mini-btn" id="sizeReset">重置</button>
                    <button class="mini-btn" id="sizeUp">+</button>
                </div>
            </div>
            <div class="control-group">
                <label>旋转角度：<span id="rotateValue">0</span>°</label>
                <input type="range" id="rotateSlider" min="0" max="360" value="0" class="slider">
                <div class="control-buttons">
                    <button class="mini-btn" id="rotateLeft">↺</button>
                    <button class="mini-btn" id="rotateReset">重置</button>
                    <button class="mini-btn" id="rotateRight">↻</button>
                </div>
            </div>
            <div class="control-group">
                <label>透明度：<span id="opacityValue">85</span>%</label>
                <input type="range" id="opacitySlider" min="20" max="100" value="85" class="slider">
            </div>
        </div>
        
        <!-- 印章选择区域 -->
        <div class="stamp-selection">
            <h2>选择印章</h2>
            <div class="stamp-container" id="stampContainer">
                <div class="stamp" data-stamp="flower" title="小花 (1)">
                    <svg width="60" height="60" viewBox="0 0 60 60">
                        <circle cx="30" cy="30" r="20" fill="#ff9e9e"/>
                        <circle cx="30" cy="20" r="5" fill="#ff6b6b"/>
                        <circle cx="40" cy="30" r="5" fill="#ff6b6b"/>
                        <circle cx="30" cy="40" r="5" fill="#ff6b6b"/>
                        <circle cx="20" cy="30" r="5" fill="#ff6b6b"/>
                        <circle cx="26" cy="26" r="5" fill="#ff6b6b"/>
                        <circle cx="34" cy="26" r="5" fill="#ff6b6b"/>
                        <circle cx="26" cy="34" r="5" fill="#ff6b6b"/>
                        <circle cx="34" cy="34" r="5" fill="#ff6b6b"/>
                    </svg>
                </div>
                <div class="stamp" data-stamp="smile" title="笑脸 (2)">
                    <svg width="60" height="60" viewBox="0 0 60 60">
                        <circle cx="30" cy="30" r="20" fill="#ffd93d"/>
                        <circle cx="24" cy="25" r="3" fill="#333"/>
                        <circle cx="36" cy="25" r="3" fill="#333"/>
                        <path d="M20,35 Q30,45 40,35" stroke="#333" stroke-width="3" fill="none"/>
                    </svg>
                </div>
                <div class="stamp" data-stamp="heart" title="爱心 (3)">
                    <svg width="60" height="60" viewBox="0 0 60 60">
                        <path d="M30,10 Q35,5 40,15 Q45,5 50,15 Q55,25 45,35 Q40,45 30,40 Q20,45 15,35 Q5,25 10,15 Q15,5 20,15 Q25,5 30,10" fill="#ff6b6b"/>
                    </svg>
                </div>
                <div class="stamp" data-stamp="cloud" title="云朵 (4)">
                    <svg width="60" height="60" viewBox="0 0 60 60">
                        <circle cx="25" cy="35" r="10" fill="#e0e0e0"/>
                        <circle cx="35" cy="30" r="12" fill="#e0e0e0"/>
                        <circle cx="45" cy="35" r="10" fill="#e0e0e0"/>
                        <rect x="15" y="35" width="35" height="10" fill="#e0e0e0"/>
                    </svg>
                </div>
                <div class="stamp" data-stamp="star" title="星星 (5)">
                    <svg width="60" height="60" viewBox="0 0 60 60">
                        <path d="M30,5 L36,22 L55,22 L40,33 L46,52 L30,41 L14,52 L20,33 L5,22 L24,22 Z" fill="#ffd93d"/>
                    </svg>
                </div>
                <div class="stamp" data-stamp="moon" title="月亮 (6)">
                    <svg width="60" height="60" viewBox="0 0 60 60">
                        <path d="M45,15 Q25,20 25,35 Q25,50 45,50 Q30,45 30,32 Q30,20 45,15" fill="#c4a7e7"/>
                    </svg>
                </div>
                <div class="stamp" data-stamp="leaf" title="树叶 (7)">
                    <svg width="60" height="60" viewBox="0 0 60 60">
                        <path d="M30,10 Q45,20 45,35 Q45,50 30,55 Q15,50 15,35 Q15,20 30,10" fill="#81c784"/>
                        <path d="M30,15 L30,50" stroke="#4caf50" stroke-width="2" fill="none"/>
                        <path d="M30,25 L40,30" stroke="#4caf50" stroke-width="1.5" fill="none"/>
                        <path d="M30,35 L40,38" stroke="#4caf50" stroke-width="1.5" fill="none"/>
                        <path d="M30,25 L20,30" stroke="#4caf50" stroke-width="1.5" fill="none"/>
                        <path d="M30,35 L20,38" stroke="#4caf50" stroke-width="1.5" fill="none"/>
                    </svg>
                </div>
                <div class="stamp" data-stamp="dot" title="圆点 (8)">
                    <svg width="60" height="60" viewBox="0 0 60 60">
                        <circle cx="30" cy="30" r="15" fill="#4fc3f7"/>
                    </svg>
                </div>
                <div class="stamp" data-stamp="petal" title="花瓣 (9)">
                    <svg width="60" height="60" viewBox="0 0 60 60">
                        <ellipse cx="30" cy="25" rx="10" ry="18" fill="#f8bbd0"/>
                        <ellipse cx="20" cy="35" rx="10" ry="18" fill="#f48fb1" transform="rotate(-45 20 35)"/>
                        <ellipse cx="40" cy="35" rx="10" ry="18" fill="#f48fb1" transform="rotate(45 40 35)"/>
                        <circle cx="30" cy="35" r="6" fill="#ffeb3b"/>
                    </svg>
                </div>
                <div class="stamp" data-stamp="triangle" title="三角">
                    <svg width="60" height="60" viewBox="0 0 60 60">
                        <path d="M30,10 L50,45 L10,45 Z" fill="#80deea"/>
                    </svg>
                </div>
                <div class="stamp" data-stamp="diamond" title="菱形">
                    <svg width="60" height="60" viewBox="0 0 60 60">
                        <path d="M30,5 L55,30 L30,55 L5,30 Z" fill="#ce93d8"/>
                    </svg>
                </div>
                <div class="stamp" data-stamp="rainbow" title="彩虹">
                    <svg width="60" height="60" viewBox="0 0 60 60">
                        <path d="M10,45 Q30,5 50,45" stroke="#ef5350" stroke-width="4" fill="none"/>
                        <path d="M15,45 Q30,12 45,45" stroke="#ffa726" stroke-width="4" fill="none"/>
                        <path d="M20,45 Q30,19 40,45" stroke="#ffee58" stroke-width="4" fill="none"/>
                        <path d="M25,45 Q30,26 35,45" stroke="#66bb6a" stroke-width="4" fill="none"/>
                        <path d="M28,45 Q30,33 32,45" stroke="#42a5f5" stroke-width="4" fill="none"/>
                    </svg>
                </div>
            </div>
        </div>
        
        <!-- 画布区域 -->
        <div class="canvas-section">
            <h2>创作区域</h2>
            <div class="canvas" id="canvas"></div>
        </div>
        
        <!-- 操作按钮 -->
        <div class="controls">
            <button class="control-btn" id="undoBtn">撤销</button>
            <button class="control-btn" id="clearBtn">清空</button>
            <button class="control-btn" id="saveBtn">保存作品</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
