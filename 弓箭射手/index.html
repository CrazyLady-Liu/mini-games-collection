<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>弓箭手射击</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="ui-panel">
            <div class="ui-item">
                <span class="label">关卡:</span>
                <span id="level" class="value">1</span>
            </div>
            <div class="ui-item">
                <span class="label">分数:</span>
                <span id="score" class="value">0</span>
            </div>
            <div class="ui-item">
                <span class="label">目标:</span>
                <span id="target" class="value">100</span>
            </div>
            <div class="ui-item">
                <span class="label">时间:</span>
                <span id="timer" class="value">60</span>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div class="controls-bar">
            <div class="angle-control">
                <span class="label">角度:</span>
                <input type="range" id="angleSlider" min="-60" max="60" value="0" class="slider">
                <span id="angleValue" class="value">0°</span>
            </div>
            <div class="power-bar">
                <div class="power-fill" id="powerFill"></div>
                <span class="power-label">力度</span>
            </div>
            <button id="shootBtn">发射!</button>
        </div>
        <div class="controls">
            <button id="restartBtn">重新开始</button>
        </div>
        <div id="gameOver" class="overlay hidden">
            <div class="message">
                <h2 id="gameOverTitle">游戏结束</h2>
                <p id="gameOverMsg">再接再厉！</p>
                <button id="playAgainBtn">再玩一次</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
